<!DOCTYPE html>
<html lang="id">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login Masjid Al-Falah</title>

  <!-- GOOGLE FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <!-- CSS -->
  <link rel="stylesheet" href="login.css">

</head>

<body>

  <!-- BACKGROUND EFFECT -->
  <div class="bg-circle circle1"></div>
  <div class="bg-circle circle2"></div>

  <!-- LOGIN PAGE -->
  <div class="container" id="loginPage">

    <div class="login-card">

            <!-- HEADER -->
      <div class="header">
<br>
<br>
<br>
<br>
    <br>
<br>
<br>
<br>
<br>
  <br>
  <br>
    <h1>LAPORAN KEUANGAN MASJID AL-FALAH</h1>

        <p>
          Jl. Sari Asih III Rw 09, Kelurahan Sarijadi
        </p>

      </div>

      <!-- FORM LOGIN -->
      <form id="loginForm">

        <!-- USERNAME -->
        <div class="input-group">

          <label for="username">
            Username
          </label>

          <input
            type="text"
            id="username"
            placeholder="Masukkan username"
            required
          >

        </div>

        <!-- PASSWORD -->
        <div class="input-group">

          <label for="password">
            Password
          </label>

          <input
            type="password"
            id="password"
            placeholder="Masukkan password"
            required
          >

        </div>

        <!-- BUTTON -->
        <button
          type="submit"
          class="login-btn"
          id="loginBtn"
        >
          LOGIN
        </button>

      </form>

      <!-- FOOTER -->
      <div class="footer-text">
        © 2026 Kelompok 01 TOI B
      </div>

    </div>

  </div>

  <!-- DASHBOARD -->
  <div
    class="dashboard-page"
    id="dashboardPage"
    style="display:none;"
  >

    <div class="dashboard-card">

      <h1>
        Selamat Datang 👋
      </h1>

      <p>
        Anda berhasil login ke sistem laporan
        keuangan Masjid Al-Falah.
      </p>

      <button
        id="logoutBtn"
        class="login-btn"
      >
        LOGOUT
      </button>

    </div>

  </div>

  <!-- JS -->
  <script src="login.js"></script>

</body>

</html>
